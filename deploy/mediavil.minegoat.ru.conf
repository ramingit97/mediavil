# Host nginx reverse proxy for the Dockerized site.
# Copy to /etc/nginx/sites-available/ and symlink into sites-enabled/.
# certbot --nginx will add the listen 443 / SSL lines and an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name mediavil.minegoat.ru;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
